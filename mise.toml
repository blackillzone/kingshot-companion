# Mise configuration for formation-calculator project
# https://mise.jdx.dev/

[env]
# Environment variables
NODE_ENV = "development"

[tools]
# Node.js version
node = "25.9.0"

# GitHub CLI version
github-cli = "2.90.0"

[tasks]
# Development server
dev = """
  npm run dev
"""

# Production build
build = """
  npm run build
"""

# Linting
lint = """
  npm run lint
"""

# Fix linting issues
lint-fix = """
  npm run lint:fix
"""

# Linting for CI
lint-ci = """
  npm run lint:ci
"""

# Preview production build
preview = """
  npm run preview
"""

# Install dependencies
install = """
  npm install
"""

# Clean build artifacts
clean = """
  rm -rf dist node_modules
  npm install
"""

[settings]

# Use the latest available version if not specified
experimental = false
